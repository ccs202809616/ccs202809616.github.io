<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>360全景</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        body{margin:0;padding:0}
        #pano{width:100%;height:100vh;}
    </style>
</head>
<body>
    <div id="pano"></div>
    <script src="pannellum.js"></script>
    <script>
    pannellum.viewer('pano', {
        type: 'equirectangular',
        panorama: 'a.jpg',  // 已改成你的图片名
        autoLoad: true,
        autoRotate: 0
    });
    </script>
</body>
</html>
