<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>360全景</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        * {margin:0; padding:0; box-sizing:border-box;}
        html, body {
            width:100%; height:100%;
            overflow:hidden;
            touch-action:none;
            background:#000;
        }
        #panorama {
            width:100vw; height:100vh;
            position:fixed; top:0; left:0;
        }
    </style>
</head>
<body>
    <div id="panorama"></div>

    <script src="pannellum.js"></script>
    <script>
        pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: 'a.jpg',
            autoLoad: true,
            showControls: true,

            // 初始视角：完全俯视顶部
            yaw: 0,
            pitch: -90,
            hfov: 100,

            // 开场动画：从顶部慢慢落下来（模仿3D溜溜效果）
            startAnim: {
                pitch: 10,     // 最终停在平视略微低头
                hfov: 90,      // 视野慢慢收缩
                speed: 20      // 动画速度（数字越小越慢）
            },

            autoRotate: 0,
            preserveOrientation: true,
            dynamicSize: true,
            minPitch: -85,
            maxPitch: 85,
            minHfov: 50,
            maxHfov: 120
        });
    </script>
</body>
</html>
