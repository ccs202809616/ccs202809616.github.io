<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>360全景</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;overflow:hidden;background:#000;}
        #panorama{width:100%;height:100%;position:fixed;top:0;left:0;}
    </style>
</head>
<body>
    <div id="panorama"></div>
    <script src="pannellum.js"></script>
    <script>
        // 初始化全景（初始视角：正上方俯视）
        const viewer = pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: 'a.jpg',
            autoLoad: true,
            showControls: true,
            yaw: 0,
            pitch: -90,
            hfov: 90,
            autoRotate: 0,
            minPitch: -88,
            maxPitch: 88,
            minHfov: 50,
            maxHfov: 110
        });

        // 3D溜溜同款：从顶部缓慢下落动画
        setTimeout(() => {
            let targetPitch = 0;
            let currentPitch = -90;
            const speed = 1.2;
            
            const anim = setInterval(() => {
                currentPitch += speed;
                if (currentPitch >= targetPitch) {
                    clearInterval(anim);
                    // 下落完成后开启自动旋转（3D溜溜同款速度）
                    viewer.setAutoRotate(1);
                }
                viewer.lookAt(0, currentPitch, 90);
            }, 30);
        }, 600);
    </script>
</body>
</html>
