<script>
const viewer = pannellum.viewer('panorama', {
    type: 'equirectangular',
    panorama: 'a.jpg',
    autoLoad: true,

    showControls: true,

    yaw: 0,
    pitch: -90,   // 从顶部开始
    hfov: 110,

    minPitch: -90,
    maxPitch: 85,

    minHfov: 50,
    maxHfov: 120,

    autoRotate: 0,

    friction: 0.15, // 更顺滑拖动
});


viewer.on('load', function () {

    const startPitch = -90;   // 顶部俯视
    const endPitch = 0;       // 平视
    const startHfov = 120;    // 远景
    const endHfov = 90;       // 正常视角

    const duration = 2800;    // 动画时间（溜溜偏慢）
    let startTime = null;

    function animate(timestamp) {

        if (!startTime) startTime = timestamp;

        let progress = (timestamp - startTime) / duration;
        if (progress > 1) progress = 1;

        /* ⭐ 核心：电影级缓动（比你之前更顺） */
        let ease = 1 - Math.pow(1 - progress, 4);

        let currentPitch = startPitch + (endPitch - startPitch) * ease;
        let currentHfov  = startHfov  + (endHfov  - startHfov)  * ease;

        viewer.lookAt(currentPitch, 0, currentHfov);

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {

            /* ⭐ 缓慢自动旋转（关键点） */
            setTimeout(()=>{
                viewer.setAutoRotate(0.25); // 很慢，很像溜溜
            }, 500);
        }
    }

    requestAnimationFrame(animate);
});


/* ⭐ 用户一操作就停止旋转（溜溜同款逻辑） */
const el = document.getElementById('panorama');

el.addEventListener('mousedown', ()=> viewer.stopAutoRotate());
el.addEventListener('touchstart', ()=> viewer.stopAutoRotate());

</script>
