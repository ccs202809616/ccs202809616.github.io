<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 手机防拉伸核心视口配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>360全景漫游</title>
    <link rel="stylesheet" href="pannellum.css">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 彻底禁止页面滚动拉扯 */
            touch-action: none; /* 禁止手机双击、滑动回弹变形 */
        }
        #panorama {
            width: 100vw;
            height: 100vh;
            position: fixed; /* 永久锁定画面比例 */
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div id="panorama"></div>

    <script src="pannellum.js"></script>
    <script>
        pannellum.viewer('panorama', {
            type: 'equirectangular',
            panorama: 'a.jpg',
            autoLoad: true,
            autoRotate: 0,
            showControls: true,
            // 手机端专属防拉伸畸变参数
            preserveOrientation: true,
            dynamicSize: true,
            // 限制视野范围，杜绝极端拉伸
            minPitch: -90,
            maxPitch: 90,
            minHfov: 50,
            maxHfov: 120
        });
    </script>
</body>
</html>
